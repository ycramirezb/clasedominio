<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Individuo</title>
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">📋 Gestión de Individuos</a>
</nav>

<div class="container-sm">
    <div class="card">
        <div class="card-body">
            <h1>Detalle del Individuo</h1>

            <div class="detail-row">
                <span class="detail-label">Nombre</span>
                <span class="detail-value" th:text="${individuo.nombre}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Apellido</span>
                <span class="detail-value" th:text="${individuo.apellido}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Edad</span>
                <span class="detail-value" th:text="${individuo.edad}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value" th:text="${individuo.email}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Teléfono</span>
                <span class="detail-value" th:text="${individuo.telefono}"></span>
            </div>

            <div style="margin-top:1.5rem">
                <a th:href="@{/}" class="btn-secondary">← Volver a la lista</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
