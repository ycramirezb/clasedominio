<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Individuo</title>
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">📋 Gestión de Individuos</a>
</nav>

<div class="container-sm">
    <div class="card">
        <div class="card-body">
            <h1 th:text="${individuo.idIndividuo == null ? 'Nuevo Individuo' : 'Editar Individuo'}"></h1>

            <form th:action="@{/guardar}" th:object="${individuo}" method="post">
                <input type="hidden" th:field="*{idIndividuo}" />

                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan">
                    <div class="form-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Apellido</label>
                    <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: García">
                    <div class="form-error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Edad</label>
                    <input type="number" th:field="*{edad}" class="form-control" placeholder="Ej: 30" min="0" max="120">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="correo@ejemplo.com">
                    <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-control" placeholder="Ej: 3001234567">
                    <div class="form-error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button>
                    <a th:href="@{/}" class="btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
