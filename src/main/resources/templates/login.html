<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-title">Bienvenido</div>
        <div class="login-subtitle">Ingresa tus credenciales para continuar</div>

        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrecta.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Tu usuario" autofocus>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
            </div>
            <div style="margin-top:1.5rem">
                <button type="submit" class="btn-primary" style="width:100%; padding:0.7rem; font-size:1rem;">
                    Iniciar Sesión
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
